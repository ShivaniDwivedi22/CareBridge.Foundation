openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CareConnect API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: caregivers
  - name: care-requests
  - name: bookings
  - name: categories
  - name: stats
  - name: reviews
  - name: messages
  - name: admin
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all care categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /caregivers:
    get:
      operationId: listCaregivers
      tags: [caregivers]
      summary: List caregivers with optional filters
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: minRating
          in: query
          schema:
            type: number
      responses:
        "200":
          description: List of caregivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Caregiver"
    post:
      operationId: createCaregiver
      tags: [caregivers]
      summary: Register as a caregiver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaregiverBody"
      responses:
        "201":
          description: Caregiver created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Caregiver"

  /caregivers/{id}:
    get:
      operationId: getCaregiver
      tags: [caregivers]
      summary: Get a caregiver by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Caregiver details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Caregiver"
        "404":
          description: Not found

  /care-requests:
    get:
      operationId: listCareRequests
      tags: [care-requests]
      summary: List care requests
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of care requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CareRequest"
    post:
      operationId: createCareRequest
      tags: [care-requests]
      summary: Post a care request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCareRequestBody"
      responses:
        "201":
          description: Care request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareRequest"

  /care-requests/{id}:
    get:
      operationId: getCareRequest
      tags: [care-requests]
      summary: Get a care request by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Care request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareRequest"
        "404":
          description: Not found

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List bookings
      parameters:
        - name: caregiverId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: seekerClerkId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingBody"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    patch:
      operationId: updateBookingStatus
      tags: [bookings]
      summary: Update booking status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingStatusBody"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List reviews
      parameters:
        - name: caregiverId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a review for a caregiver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews/{id}/status:
    patch:
      operationId: updateReviewStatus
      tags: [reviews]
      summary: Update review status (admin moderation)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReviewStatusBody"
      responses:
        "200":
          description: Updated review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /conversations:
    get:
      operationId: listConversations
      tags: [messages]
      summary: List conversations for a user
      parameters:
        - name: clerkUserId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [messages]
      summary: Create or get a conversation between two users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationBody"
      responses:
        "201":
          description: Conversation created or found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: Get messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /admin/caregivers:
    get:
      operationId: adminListCaregivers
      tags: [admin]
      summary: Admin list all caregivers with verification status
      responses:
        "200":
          description: List of caregivers for admin
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Caregiver"

  /admin/caregivers/{id}/approve:
    patch:
      operationId: adminApproveCaregiver
      tags: [admin]
      summary: Approve a caregiver profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Caregiver"

  /admin/caregivers/{id}/reject:
    patch:
      operationId: adminRejectCaregiver
      tags: [admin]
      summary: Reject a caregiver profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Caregiver"

  /stats/overview:
    get:
      operationId: getStatsOverview
      tags: [stats]
      summary: Get dashboard overview stats
      responses:
        "200":
          description: Overview statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsOverview"

  /stats/featured-caregivers:
    get:
      operationId: getFeaturedCaregivers
      tags: [stats]
      summary: Get top-rated featured caregivers
      responses:
        "200":
          description: Featured caregivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Caregiver"

  /stats/recent-requests:
    get:
      operationId: getRecentCareRequests
      tags: [stats]
      summary: Get recently posted care requests
      responses:
        "200":
          description: Recent care requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CareRequest"

  /stats/provider-earnings:
    get:
      operationId: getProviderEarnings
      tags: [stats]
      summary: Get earnings summary for a provider
      parameters:
        - name: caregiverId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Earnings summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderEarnings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        icon:
          type: string
        caregiverCount:
          type: integer
      required:
        - id
        - name
        - slug
        - description
        - icon
        - caregiverCount

    Caregiver:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
          nullable: true
        location:
          type: string
        categoryIds:
          type: array
          items:
            type: integer
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        hourlyRate:
          type: number
        rating:
          type: number
        reviewCount:
          type: integer
        yearsExperience:
          type: integer
        isVerified:
          type: boolean
        certifications:
          type: string
          nullable: true
        languages:
          type: string
          nullable: true
        services:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        pastWorkReferences:
          type: string
          nullable: true
        backgroundCheckConsent:
          type: boolean
        policeVerification:
          type: boolean
        medicalFitnessDeclaration:
          type: boolean
        medicalNursingLicense:
          type: string
          nullable: true
        foodSafetyCertificate:
          type: boolean
        insuranceLicense:
          type: string
          nullable: true
        serviceRadius:
          type: string
          nullable: true
        onSiteRemote:
          type: string
          nullable: true
        availabilitySchedule:
          type: string
          nullable: true
        pricingUnit:
          type: string
          nullable: true
        termsAccepted:
          type: boolean
        codeOfConductAccepted:
          type: boolean
        liabilityWaiverAccepted:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - bio
        - location
        - categoryIds
        - hourlyRate
        - rating
        - reviewCount
        - yearsExperience
        - isVerified
        - backgroundCheckConsent
        - policeVerification
        - medicalFitnessDeclaration
        - foodSafetyCertificate
        - termsAccepted
        - codeOfConductAccepted
        - liabilityWaiverAccepted
        - createdAt

    CreateCaregiverBody:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
        location:
          type: string
        categoryIds:
          type: array
          items:
            type: integer
        hourlyRate:
          type: number
        yearsExperience:
          type: integer
        certifications:
          type: string
        languages:
          type: string
        services:
          type: string
        phone:
          type: string
        pastWorkReferences:
          type: string
        backgroundCheckConsent:
          type: boolean
        policeVerification:
          type: boolean
        medicalFitnessDeclaration:
          type: boolean
        medicalNursingLicense:
          type: string
        foodSafetyCertificate:
          type: boolean
        insuranceLicense:
          type: string
        serviceRadius:
          type: string
        onSiteRemote:
          type: string
        availabilitySchedule:
          type: string
        pricingUnit:
          type: string
        termsAccepted:
          type: boolean
        codeOfConductAccepted:
          type: boolean
        liabilityWaiverAccepted:
          type: boolean
      required:
        - name
        - bio
        - location
        - categoryIds
        - hourlyRate
        - yearsExperience

    CareRequest:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        categoryId:
          type: integer
        category:
          $ref: "#/components/schemas/Category"
        location:
          type: string
        startDate:
          type: string
        endDate:
          type: string
          nullable: true
        budget:
          type: number
        status:
          type: string
          enum: [open, filled, cancelled]
        seekerName:
          type: string
        seekerClerkId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - categoryId
        - location
        - startDate
        - budget
        - status
        - seekerName
        - createdAt

    CreateCareRequestBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        categoryId:
          type: integer
        location:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        budget:
          type: number
        seekerName:
          type: string
        seekerClerkId:
          type: string
      required:
        - title
        - description
        - categoryId
        - location
        - startDate
        - budget
        - seekerName

    Booking:
      type: object
      properties:
        id:
          type: integer
        caregiverId:
          type: integer
        caregiver:
          $ref: "#/components/schemas/Caregiver"
        careRequestId:
          type: integer
        careRequest:
          $ref: "#/components/schemas/CareRequest"
        status:
          type: string
          enum: [pending, confirmed, completed, cancelled]
        message:
          type: string
          nullable: true
        seekerClerkId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - caregiverId
        - careRequestId
        - status
        - createdAt

    CreateBookingBody:
      type: object
      properties:
        caregiverId:
          type: integer
        careRequestId:
          type: integer
        message:
          type: string
        seekerClerkId:
          type: string
      required:
        - caregiverId
        - careRequestId

    UpdateBookingStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, completed, cancelled]
      required:
        - status

    Review:
      type: object
      properties:
        id:
          type: integer
        caregiverId:
          type: integer
        bookingId:
          type: integer
          nullable: true
        rating:
          type: integer
        comment:
          type: string
        reviewerName:
          type: string
        reviewerClerkId:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - caregiverId
        - rating
        - comment
        - reviewerName
        - status
        - createdAt

    CreateReviewBody:
      type: object
      properties:
        caregiverId:
          type: integer
        bookingId:
          type: integer
        rating:
          type: integer
        comment:
          type: string
        reviewerName:
          type: string
        reviewerClerkId:
          type: string
      required:
        - caregiverId
        - rating
        - comment
        - reviewerName

    UpdateReviewStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, approved, rejected]
      required:
        - status

    Conversation:
      type: object
      properties:
        id:
          type: integer
        participantAClerkId:
          type: string
        participantBClerkId:
          type: string
        participantAName:
          type: string
        participantBName:
          type: string
        lastMessage:
          type: string
          nullable: true
        lastMessageAt:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - participantAClerkId
        - participantBClerkId
        - participantAName
        - participantBName
        - createdAt

    CreateConversationBody:
      type: object
      properties:
        participantAClerkId:
          type: string
        participantBClerkId:
          type: string
        participantAName:
          type: string
        participantBName:
          type: string
      required:
        - participantAClerkId
        - participantBClerkId
        - participantAName
        - participantBName

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderClerkId:
          type: string
        senderName:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - senderClerkId
        - senderName
        - content
        - createdAt

    SendMessageBody:
      type: object
      properties:
        senderClerkId:
          type: string
        senderName:
          type: string
        content:
          type: string
      required:
        - senderClerkId
        - senderName
        - content

    StatsOverview:
      type: object
      properties:
        totalCaregivers:
          type: integer
        totalCareRequests:
          type: integer
        totalBookings:
          type: integer
        openRequests:
          type: integer
        categoryCounts:
          type: array
          items:
            type: object
            properties:
              categoryName:
                type: string
              count:
                type: integer
            required:
              - categoryName
              - count
      required:
        - totalCaregivers
        - totalCareRequests
        - totalBookings
        - openRequests
        - categoryCounts

    ProviderEarnings:
      type: object
      properties:
        totalEarnings:
          type: number
        completedBookings:
          type: integer
        pendingBookings:
          type: integer
        confirmedBookings:
          type: integer
        averageRating:
          type: number
        totalReviews:
          type: integer
      required:
        - totalEarnings
        - completedBookings
        - pendingBookings
        - confirmedBookings
        - averageRating
        - totalReviews
